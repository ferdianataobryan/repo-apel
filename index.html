<!DOCTYPE html>
<html>
<head>
  <title>Absensi Apel BKPSDM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f7fa;
    }

    h1 {
      background: #1e3a8a;
      color: white;
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
      gap: 10px;
      padding: 10px;
    }

    .pegawai {
      background: white;
      padding: 20px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #signatureModal {
      display: none;
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
    }

    .modal-content {
      background: white;
      margin: 50px auto;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }

    canvas {
      border: 2px solid #000;
      width: 100%;
      height: 200px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>SISTEM ABSENSI APEL PAGI</h1>

<div class="grid" id="listPegawai"></div>

<div id="signatureModal">
  <div class="modal-content">
    <h3 id="namaPegawai"></h3>

    <canvas id="signatureCanvas"></canvas><br>

    <button onclick="clearPad()">Ulangi</button>
    <button onclick="simpan()">Simpan</button>
    <button onclick="tutup()">Batal</button>
  </div>
</div>

<script>
const scriptURL = "PASTE_URL_APPS_SCRIPT_DISINI";

const pegawai = [
  {nama:"Budi", nip:"123", unit:"BKPSDM"},
  {nama:"Siti", nip:"124", unit:"BKPSDM"},
  {nama:"Ahmad", nip:"125", unit:"BKPSDM"}
];

let selected = null;

const container = document.getElementById("listPegawai");

pegawai.forEach(p => {
  const div = document.createElement("div");
  div.className = "pegawai";
  div.innerText = p.nama;

  div.onclick = () => bukaTTD(p);

  container.appendChild(div);
});

let canvas = document.getElementById("signatureCanvas");
let signaturePad = new SignaturePad(canvas);

function bukaTTD(p) {
  selected = p;
  document.getElementById("namaPegawai").innerText = p.nama;
  document.getElementById("signatureModal").style.display = "block";
}

function tutup() {
  document.getElementById("signatureModal").style.display = "none";
}

function clearPad() {
  signaturePad.clear();
}

function simpan() {
  if (signaturePad.isEmpty()) {
    alert("Tanda tangan dulu!");
    return;
  }

  const ttd = signaturePad.toDataURL();

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      nama: selected.nama,
      nip: selected.nip,
      unit: selected.unit,
      ttd: ttd
    })
  })
  .then(res => res.json())
  .then(res => {
    alert("Absensi berhasil!");
    tutup();
    signaturePad.clear();
  })
  .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Absensi BKPSDM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h1 {
      background: #1e3a8a;
      color: white;
      padding: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    button {
      padding: 5px 10px;
      margin: 2px;
      cursor: pointer;
    }

    .izin { background: orange; color:white; }
    .sakit { background: red; color:white; }
    .alpha { background: gray; color:white; }
  </style>
</head>

<body>

<h1>ADMIN PANEL ABSENSI</h1>

<table id="tabel">
  <thead>
    <tr>
      <th>Nama</th>
      <th>NIP</th>
      <th>Status</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const scriptURL = "PASTE_URL_APPS_SCRIPT";

fetch(scriptURL)
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector("#tabel tbody");

    data.slice(1).forEach(row => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[4] || "-"}</td>
        <td>
          <button class="izin" onclick="update('${row[2]}','IZIN')">Izin</button>
          <button class="sakit" onclick="update('${row[2]}','SAKIT')">Sakit</button>
          <button class="alpha" onclick="update('${row[2]}','ALPHA')">Alpha</button>
        </td>
      `;

      tbody.appendChild(tr);
    });
  });

function update(nip, status) {
  const keterangan = prompt("Masukkan keterangan:");

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      mode: "admin",
      nip: nip,
      status: status,
      keterangan: keterangan
    })
  })
  .then(res => res.json())
  .then(res => {
    alert("Update berhasil");
    location.reload();
  });
}
</script>

</body>
</html>
